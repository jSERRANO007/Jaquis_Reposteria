{% extends 'base.html' %}
{% block content %}
<section class="panel">
  <h2>Registrar pedido</h2>
  <form action="/pedido" method="post" enctype="multipart/form-data" class="form-grid">
    <input name="customer_name" placeholder="Nombre del cliente" required>
    <input name="phone" placeholder="Teléfono" required>
    <input type="date" name="delivery_date" required>
    <input type="time" name="delivery_time" required>
    <select name="product_name" id="product_name" required onchange="syncProduct()">
      {% for p in products %}
      <option data-category="{{ p.category }}" data-price="{{ p.price }}">{{ p.name }}</option>
      {% endfor %}
    </select>
    <input name="category" id="category" readonly>
    <input type="number" min="1" value="1" name="quantity" id="quantity" required oninput="calc()">
    <input type="number" step="0.01" name="unit_price" id="unit_price" readonly>
    <select name="packaging">
      <option>Burbuja</option>
      <option>Empaque individual</option>
      <option>Empaque especial</option>
    </select>
    <textarea name="notes" placeholder="Indicaciones adicionales"></textarea>
    <label>Comprobante (si aplica)<input type="file" name="proof_file"></label>
    <div class="summary">
      <p>Total: <strong id="total">₡0</strong></p>
      <p>Adelanto 50%: <strong id="deposit">₡0</strong></p>
    </div>
    <button class="btn" type="submit">Guardar y preparar WhatsApp</button>
  </form>
</section>
<script>
function syncProduct(){
  const sel = document.getElementById('product_name');
  const opt = sel.options[sel.selectedIndex];
  document.getElementById('category').value = opt.dataset.category;
  document.getElementById('unit_price').value = opt.dataset.price;
  calc();
}
function calc(){
  const q = Number(document.getElementById('quantity').value || 0);
  const p = Number(document.getElementById('unit_price').value || 0);
  const total = q*p; const dep = q>=10 ? total*0.5 : 0;
  document.getElementById('total').innerText = '₡'+total.toLocaleString('es-CR');
  document.getElementById('deposit').innerText = '₡'+dep.toLocaleString('es-CR');
}
syncProduct();
</script>
{% endblock %}
